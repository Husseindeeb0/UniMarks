server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API routes proxying directly to backend container
    location ~ ^/(auth|user|course|courseEnrollment|teacherCourse|mark) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API error handler
    location @api_error {
        default_type application/json;
        if ($status = 404) {
            return 404 '{"error": "API endpoint not found", "status": 404}';
        }
        return 502 '{"error": "Backend service unavailable or error", "status": 502}';
    }
}